name: ZAP Full Scan (Weekly)

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  zap-full:
    name: ZAP Full Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Fetch the most recent production deployment URL from the Vercel API.
      # This stays accurate as you redeploy — no hardcoded URL needed.
      - name: Get Vercel production URL
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // "NONE"')
          URL=$(echo "$RESPONSE"   | jq -r '.deployments[0].url   // ""')
          if [ -z "$URL" ] || [ "$STATE" != "READY" ]; then
            echo "No ready production deployment found (state: $STATE)" && exit 1
          fi
          echo "target=https://$URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: https://$URL"

      # Full scan: spider + active attack. Thorough but slow (~30-60 min).
      # Opens a GitHub issue with findings — does not comment on any PR.
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ steps.deployment.outputs.target }}
          rules_file_name: .zap/rules.tsv
          fail_action: false
          issue_title: "ZAP Full Scan (${{ steps.date.outputs.date }})"
