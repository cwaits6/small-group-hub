name: ZAP Full Scan (Weekly)

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  zap-full:
    name: ZAP Full Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy ephemeral preview
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --token="$VERCEL_TOKEN" --yes 2>/dev/null)
          echo "target=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          DEPLOY_ID=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&url=${DEPLOY_URL#https://}&limit=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments[0].uid // ""')
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        env:
          ZAP_AUTH_HEADER: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET != '' && 'x-vercel-protection-bypass' || '' }}
          ZAP_AUTH_HEADER_VALUE: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ steps.deployment.outputs.target }}
          rules_file_name: .zap/rules.tsv
          allow_issue_writing: true
          fail_action: false
          issue_title: "ZAP Full Scan (${{ steps.date.outputs.date }})"

      - name: Delete ephemeral preview
        if: always() && steps.deployment.outputs.deploy_id != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOY_ID: ${{ steps.deployment.outputs.deploy_id }}
        run: |
          curl -sf -X DELETE "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN"
