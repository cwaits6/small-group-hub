name: ZAP Baseline Scan (PR)

on:
  pull_request:
    branches: [main]
    # Only scan when the PR is opened or marked ready for review — not on every push.
    # This avoids running 10 scans for 10 commits during active development.
    # Devs can work in draft, then mark ready when they want a security check.
    types: [opened, ready_for_review]

# If a new push triggers this while a scan is already running, cancel the old one.
concurrency:
  group: zap-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    # Skip draft PRs entirely (redundant with trigger types above, but explicit).
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Poll the Vercel API until the preview for this commit is ready.
      # Uses commit SHA (not branch name) to precisely match the right deployment.
      - name: Wait for Vercel preview deployment
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Polling for Vercel deployment (commit: $COMMIT_SHA)..."
          for i in $(seq 1 24); do
            RESPONSE=$(curl -sf \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-githubCommitSha=$COMMIT_SHA&limit=1" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // "NONE"')
            URL=$(echo "$RESPONSE"   | jq -r '.deployments[0].url   // ""')
            echo "Attempt $i/24: state=$STATE"
            if [ "$STATE" = "READY" ] && [ -n "$URL" ]; then
              echo "target=https://$URL" >> "$GITHUB_OUTPUT"
              echo "Preview ready: https://$URL"
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Vercel deployment failed: $STATE" && exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for Vercel deployment (12 min)" && exit 1

      # Baseline scan: spider + passive scan only. Fast (~3-5 min), no active attack.
      # Posts results as a PR comment. fail_action: false = report only, don't block merge.
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ steps.deployment.outputs.target }}
          rules_file_name: .zap/rules.tsv
          fail_action: true
          # Optional: sends x-vercel-protection-bypass header on all ZAP requests.
          # Only needed if Vercel Deployment Protection is enabled on your project.
          # Set VERCEL_AUTOMATION_BYPASS_SECRET in repo secrets to activate.
          cmd_options: >-
            -config replacer.full_list(0).description=VercelBypass
            -config replacer.full_list(0).enabled=true
            -config replacer.full_list(0).matchtype=REQ_HEADER
            -config replacer.full_list(0).matchstr=x-vercel-protection-bypass
            -config replacer.full_list(0).replacement=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
