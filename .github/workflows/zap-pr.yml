name: ZAP Baseline Scan (PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan (skips Vercel lookup — useful when testing workflow changes)'
        required: true
        type: string

# If a new push triggers this while a scan is already running, cancel the old one.
# For workflow_dispatch (no PR number), use the run ID so manual runs don't cancel each other.
concurrency:
  group: zap-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    # Skip draft PRs entirely (redundant with trigger types above, but explicit).
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Poll the Vercel API until a ready preview exists for this PR.
      # Primary: look up by commit SHA for precision.
      # Fallback: if Vercel canceled the build (e.g. only CI/config files changed),
      # use the most recent READY deployment for the branch — the app hasn't changed
      # so the previous deployment is still valid to scan.
      # Manual dispatch: skip Vercel lookup entirely and use the provided URL.
      - name: Wait for Vercel preview deployment
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
          MANUAL_URL: ${{ inputs.target_url }}
        run: |
          if [ -n "$MANUAL_URL" ]; then
            echo "Using manually provided URL: $MANUAL_URL"
            echo "target=$MANUAL_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          resolve_url() {
            echo "target=https://$1" >> "$GITHUB_OUTPUT"
            echo "Preview ready: https://$1"
            exit 0
          }

          echo "Polling for Vercel deployment (commit: $COMMIT_SHA)..."
          for i in $(seq 1 24); do
            RESPONSE=$(curl -sf \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-githubCommitSha=$COMMIT_SHA&limit=1" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // "NONE"')
            URL=$(echo "$RESPONSE"   | jq -r '.deployments[0].url   // ""')
            echo "Attempt $i/24: state=$STATE"
            if [ "$STATE" = "READY" ] && [ -n "$URL" ]; then
              resolve_url "$URL"
            elif [ "$STATE" = "CANCELED" ]; then
              # Vercel skipped this commit (only non-app files changed).
              # Try: 1) latest READY on this branch, 2) latest READY on main.
              # Main is valid when the PR has no app changes (same code, different CI).
              echo "Vercel skipped this commit — looking for fallback deployment..."
              for REF in "$HEAD_REF" "main"; do
                FB=$(curl -sf \
                  "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&meta-githubCommitRef=$REF&limit=10" \
                  -H "Authorization: Bearer $VERCEL_TOKEN")
                FB_URL=$(echo "$FB" | jq -r '[.deployments[] | select(.state=="READY")][0].url // ""')
                if [ -n "$FB_URL" ]; then
                  echo "Using deployment from '$REF' branch"
                  resolve_url "$FB_URL"
                fi
              done
              echo "No READY deployment found for branch or main" && exit 1
            elif [ "$STATE" = "ERROR" ]; then
              echo "Vercel deployment errored" && exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for Vercel deployment (12 min)" && exit 1

      # Build ZAP cmd_options conditionally.
      # When VERCEL_AUTOMATION_BYPASS_SECRET is unset, omit the replacer config entirely.
      # Sending an empty x-vercel-protection-bypass header causes Vercel to reject
      # every ZAP request with 401, breaking the scan.
      - name: Build ZAP cmd options
        id: zap-opts
        env:
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -n "$BYPASS_SECRET" ]; then
            printf 'opts=-config replacer.full_list(0).description=VercelBypass -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=x-vercel-protection-bypass -config replacer.full_list(0).replacement=%s\n' \
              "$BYPASS_SECRET" >> "$GITHUB_OUTPUT"
          else
            echo "opts=" >> "$GITHUB_OUTPUT"
          fi

      # Baseline scan: spider + passive scan only. Fast (~3-5 min), no active attack.
      # Posts results as a PR comment. fail_action: false = report only, don't block merge.
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ steps.deployment.outputs.target }}
          rules_file_name: .zap/rules.tsv
          fail_action: true
          cmd_options: ${{ steps.zap-opts.outputs.opts }}
