language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
    ignore_usernames:
      - "renovate[bot]"
  path_filters:
    - "!node_modules/**"
    - "!.next/**"
    - "!package-lock.json"
    - "!CHANGELOG.md"
    - "!public/**"
    - "!next-env.d.ts"

chat:
  auto_reply: true
