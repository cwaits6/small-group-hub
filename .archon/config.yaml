# Project-scoped Archon config
# Inherits defaults from ~/.archon/config.yaml.
# Reference: https://archon.diy/reference/configuration/
#
# Examples:
#   assistants:
#     claude:
#       model: sonnet
#   docs:
#     path: docs

# Copy gitignored local config into each Archon worktree so dev servers
# and Supabase clients work out of the box.
worktree:
  copyFiles:
    - .env.local
